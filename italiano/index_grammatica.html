<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammatica italiana · PLIDA B1–C1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ede9df; --card:#faf7f1; --border:#c4bead;
  --text:#1a1814; --text2:#44413a; --text3:#706c64;
  --accent:#7a5a0a; --accent-light:#f0e0c0; --accent-mid:#b89050;
  --shadow:0 2px 14px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --shadow-sm:0 1px 6px rgba(0,0,0,.07);
  --radius:14px; --radius-sm:8px;
  --green:#1a6028; --green-bg:#e4f2e8;
  --blue:#163494; --blue-bg:#e6ebf8;
  --purple:#6a1a8a; --purple-bg:#f2e6f8;
  --wine:#8b1a4a; --wine-bg:#f8e6ee;
  --teal:#0e6060; --teal-bg:#e0f2f2;
  --orange:#8b4a0a; --orange-bg:#f8ede0;
  /* dark card colors */
  --dk-blue:#1a2f6e; --dk-green:#06402b; --dk-purple:#4a1460;
  --dk-wine:#6e1438; --dk-teal:#0a4242; --dk-orange:#8b5e00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.site-header{background:var(--card);border-bottom:2px solid var(--border);padding:28px 20px 22px;}
.header-inner{max-width:900px;margin:0 auto;}
.header-top{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;flex-wrap:wrap;}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:700;color:var(--text);}
.header-tag{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:20px;padding:3px 11px;}
.header-sub{font-size:.78rem;color:var(--text3);font-weight:500;margin-bottom:18px;}
.header-sub strong{color:var(--accent);}

/* STATS ROW */
.stats-row{display:flex;flex-wrap:wrap;gap:8px;}
.stat-badge{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px;}
.stat-badge .dot{width:7px;height:7px;border-radius:50%;}

/* SEARCH */
.search-wrap{max-width:900px;margin:0 auto;padding:18px 20px 0;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;box-shadow:var(--shadow-sm);}
.search-icon{color:var(--text3);font-size:1rem;flex-shrink:0;}
.search-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;}
.search-input::placeholder{color:var(--text3);}

/* FILTER TABS */
.filter-wrap{max-width:900px;margin:0 auto;padding:14px 20px 0;}
.filter-tabs{display:flex;gap:7px;flex-wrap:wrap;}
.ftab{border:1.5px solid var(--border);border-radius:20px;padding:6px 15px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;white-space:nowrap;}
.ftab:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* GRID */
.main{max-width:960px;margin:0 auto;padding:18px 20px 48px;}
.section-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:22px 0 12px;padding-left:2px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;align-items:stretch;}

/* CARD */
.topic-card{position:relative;border:1.5px solid transparent;border-radius:var(--radius);box-shadow:0 3px 16px rgba(0,0,0,.25),0 1px 4px rgba(0,0,0,.14);cursor:pointer;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;text-decoration:none;display:flex;overflow:hidden;isolation:isolate;}
.topic-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.28);box-shadow:0 10px 30px rgba(0,0,0,.36),0 2px 8px rgba(0,0,0,.18);}
.topic-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.02) 45%,rgba(0,0,0,.14) 100%);pointer-events:none;border-radius:inherit;z-index:0;}
.card-accent{display:none;}
.card-body{position:relative;z-index:1;padding:22px 22px 60px;flex:1;display:flex;flex-direction:column;min-height:0;}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.card-num{font-size:.7rem;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.55);}
.card-level{font-size:.65rem;font-weight:700;letter-spacing:.04em;border-radius:10px;padding:3px 9px;border:1px solid;}
.card-level.tier1{background:rgba(40,170,130,.22);border-color:rgba(90,210,170,.5);color:#a8efd1;}
.card-level.tier2{background:rgba(70,130,240,.22);border-color:rgba(120,170,250,.5);color:#bcd5ff;}
.card-level.tier3{background:rgba(150,100,235,.22);border-color:rgba(185,145,250,.5);color:#d6c0ff;}
.card-title{font-family:'Playfair Display',serif;font-size:1.02rem;font-weight:700;letter-spacing:1px;color:#fff;margin-bottom:10px;line-height:1.3;}
.card-desc{font-size:.84rem;color:rgba(255,255,255,.8);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:none;}
.card-tag{display:none;}
.card-action{position:absolute;bottom:14px;right:14px;z-index:2;display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;letter-spacing:.03em;color:rgba(255,255,255,.96);background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.24);border-radius:20px;padding:5px 11px 5px 12px;transition:all .15s ease;backdrop-filter:blur(2px);}
.topic-card:hover .card-action{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.42);}
.card-action .arrow{font-size:.95rem;line-height:1;transition:transform .15s ease;}
.topic-card:hover .card-action .arrow{transform:translateX(2px);}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:2rem;margin-bottom:10px;}
.empty-state p{font-weight:500;font-size:.9rem;}

/* HIDDEN */
.hidden{display:none!important;}

/* BACK BUTTON */
.back-btn{position:fixed;top:18px;left:18px;z-index:100;display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px 7px 11px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--text2);text-decoration:none;box-shadow:var(--shadow-sm);transition:all .15s;}
.back-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);transform:translateX(-2px);}
.back-btn .arrow{font-size:1rem;line-height:1;}
@media (max-width:600px){.back-btn{top:12px;left:12px;padding:6px 12px 6px 9px;font-size:.74rem;}}

/* PLACEHOLDER CARDS — fondo blanco, texto negro */
.topic-card.placeholder {
  background: #ffffff !important;
  border: 2px dashed #bbb !important;
  box-shadow: 0 2px 10px rgba(0,0,0,.08) !important;
}
.topic-card.placeholder .card-num { color: #999 !important; }
.topic-card.placeholder .card-title { color: #1a1814 !important; }
.topic-card.placeholder .card-desc { color: #555 !important; }
.topic-card.placeholder .card-tag {
  background: #f0ede8 !important;
  border: 1px solid #ccc !important;
  color: #333 !important;
}
.topic-card.placeholder .card-cta {
  background: #f0ede8 !important;
  border: 1px solid #bbb !important;
  color: #333 !important;
}
.topic-card.placeholder::before { background: none !important; }
.topic-card.placeholder:hover { border-color: #888 !important; }
</style>
</head>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <h1>🇮🇹 Grammatica italiana</h1>
      <span class="header-tag">PLIDA A1–C1</span>
    </div>

    <div class="stats-row">
      <div class="stat-badge"><span class="dot" style="background:var(--teal)"></span>Verbos y tiempos</div>
      <div class="stat-badge"><span class="dot" style="background:var(--green)"></span>Sintaxis</div>
      <div class="stat-badge"><span class="dot" style="background:var(--wine)"></span>Discurso</div>
      <div class="stat-badge"><span class="dot" style="background:var(--orange)"></span>Léxico gramatical</div>
      <div class="stat-badge"><span class="dot" style="background:var(--purple)"></span>Producción</div>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Buscar tema… (ej: congiuntivo, passato, avverbi…)" oninput="filterCards(this.value)" id="search-input">
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">Todos</button>
    <button class="ftab" onclick="setFilter('verbos',this)">Verbos y tiempos</button>
    <button class="ftab" onclick="setFilter('sintaxis',this)">Sintaxis</button>
    <button class="ftab" onclick="setFilter('discurso',this)">Discurso</button>
    <button class="ftab" onclick="setFilter('lexico',this)">Léxico gramatical</button>
    <button class="ftab" onclick="setFilter('produccion',this)">Producción</button>
  </div>
</div>

<main class="main" id="main">
  <div class="grid" id="grid"></div>
  <div class="empty-state hidden" id="empty">
    <div class="empty-icon">🔎</div>
    <p>Ningún tema coincide con tu búsqueda.</p>
  </div>
</main>

const CAT_LABELS = {
  verbos:"Verbos y tiempos",
  sintaxis:"Sintaxis",
  discurso:"Discurso",
  lexico:"Léxico gramatical",
  produccion:"Producción"
};

let activeFilter = "all";
let searchVal = "";

function getLevelTier(level){
  if(level.includes("C1")) return "tier3";
  if(level.includes("B2")) return "tier2";
  return "tier1";
}

function buildCards(items){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if(!items.length){
    grid.innerHTML="";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  // Group by category
  const cats = ["verbos","sintaxis","discurso","lexico","produccion"];
  let html = "";
  cats.forEach(cat => {
    const filtered = items.filter(t => t.cat === cat);
    if(!filtered.length) return;
    if(activeFilter === "all"){
      html += `<div class="section-label" style="grid-column:1/-1">${CAT_LABELS[cat]}</div>`;
    }
    filtered.forEach(t => {
      const tier = getLevelTier(t.level);
      const placeholderClass = t.placeholder ? " placeholder" : "";
      html += `
        <a class="topic-card${placeholderClass}" href="${t.file}" target="_blank" data-cat="${t.cat}" data-search="${t.title.toLowerCase()} ${t.desc.toLowerCase()} ${t.tags.join(" ").toLowerCase()}" style="background:${t.colorbg};">
          <div class="card-body">
            <div class="card-top">
              <span class="card-num">${t.num}</span>
              <span class="card-level ${tier}">${t.level}</span>
            </div>
            <div class="card-title">${t.title}</div>
            <div class="card-desc">${t.desc}</div>
            <div class="card-tags">
              ${t.tags.map(tag => `<span class="card-tag">${tag}</span>`).join("")}
            </div>
            <span class="card-action">Ver más <span class="arrow">→</span></span>
          </div>
        </a>`;
    });
  });
  grid.innerHTML = html;
}

function applyFilters(){
  let items = TOPICS;
  if(activeFilter !== "all") items = items.filter(t => t.cat === activeFilter);
  if(searchVal.trim()){
    const q = searchVal.trim().toLowerCase();
    items = items.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q))
    );
  }
  buildCards(items);
}

function setFilter(cat, btn){
  activeFilter = cat;
  document.querySelectorAll(".ftab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function filterCards(val){
  searchVal = val;
  applyFilters();
}

// Init
applyFilters();
</script>
