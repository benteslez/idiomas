<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gramática portuguesa (PB) · CEFR A1–C1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ede9df; --card:#faf7f1; --border:#c4bead;
  --text:#1a1814; --text2:#44413a; --text3:#706c64;
  --accent:#7a5a0a; --accent-light:#f0e0c0; --accent-mid:#b89050;
  --shadow:0 2px 14px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --shadow-sm:0 1px 6px rgba(0,0,0,.07);
  --radius:14px; --radius-sm:8px;
  --green:#1a6028; --green-bg:#e4f2e8;
  --blue:#163494; --blue-bg:#e6ebf8;
  --purple:#6a1a8a; --purple-bg:#f2e6f8;
  --wine:#8b1a4a; --wine-bg:#f8e6ee;
  --teal:#0e6060; --teal-bg:#e0f2f2;
  --orange:#8b4a0a; --orange-bg:#f8ede0;
  /* dark card colors */
  --dk-blue:#1a2f6e; --dk-green:#06402b; --dk-purple:#4a1460;
  --dk-wine:#6e1438; --dk-teal:#0a4242; --dk-orange:#8b5e00;
  /* level tier accents */
  --tier-low-bg:rgba(45,180,110,.18);
  --tier-low-bd:rgba(110,231,160,.45);
  --tier-low-fg:#9ef0bd;
  --tier-mid-bg:rgba(80,140,255,.20);
  --tier-mid-bd:rgba(140,180,255,.50);
  --tier-mid-fg:#a8c8ff;
  --tier-high-bg:rgba(155,110,255,.22);
  --tier-high-bd:rgba(190,160,255,.50);
  --tier-high-fg:#d3c0ff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.site-header{background:var(--card);border-bottom:2px solid var(--border);padding:28px 20px 22px;}
.header-inner{max-width:1080px;margin:0 auto;}
.header-top{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;flex-wrap:wrap;}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:700;color:var(--text);}
.header-tag{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:20px;padding:3px 11px;}
.header-sub{font-size:.78rem;color:var(--text3);font-weight:500;margin-bottom:18px;}
.header-sub strong{color:var(--accent);}

/* STATS ROW */
.stats-row{display:flex;flex-wrap:wrap;gap:8px;}
.stat-badge{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px;}
.stat-badge .dot{width:7px;height:7px;border-radius:50%;}

/* SEARCH */
.search-wrap{max-width:1080px;margin:0 auto;padding:18px 20px 0;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;box-shadow:var(--shadow-sm);}
.search-icon{color:var(--text3);font-size:1rem;flex-shrink:0;}
.search-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;}
.search-input::placeholder{color:var(--text3);}

/* FILTER TABS */
.filter-wrap{max-width:1080px;margin:0 auto;padding:14px 20px 0;}
.filter-tabs{display:flex;gap:7px;flex-wrap:wrap;}
.ftab{border:1.5px solid var(--border);border-radius:20px;padding:6px 15px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;white-space:nowrap;}
.ftab:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* GRID */
.main{max-width:1080px;margin:0 auto;padding:18px 20px 56px;}
.section-label{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:22px 0 12px;padding-left:2px;}
.grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:14px;
  align-items:stretch;
}
@media (max-width:880px){.grid{grid-template-columns:repeat(2, minmax(0, 1fr));}}
@media (max-width:560px){.grid{grid-template-columns:1fr;}}

/* CARD */
.topic-card{
  position:relative;
  isolation:isolate;
  border:1.5px solid rgba(255,255,255,.06);
  border-radius:var(--radius);
  box-shadow:0 3px 16px rgba(0,0,0,.22),0 1px 4px rgba(0,0,0,.14);
  cursor:pointer;
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  text-decoration:none;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-height:100%;
}
.topic-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.02) 38%, rgba(0,0,0,.18) 100%);
  pointer-events:none;
  z-index:0;
}
.topic-card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.30);
  box-shadow:0 10px 30px rgba(0,0,0,.36),0 3px 10px rgba(0,0,0,.20);
}

.card-body{
  position:relative;
  z-index:1;
  padding:22px 22px 14px;
  flex:1;
  display:flex;
  flex-direction:column;
}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.card-num{font-size:.7rem;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.5);}

/* Level badge by tier */
.card-level{
  font-size:.66rem;
  font-weight:700;
  letter-spacing:.04em;
  border-radius:10px;
  padding:3px 9px;
  border:1px solid;
}
.card-level.tier-low{background:var(--tier-low-bg);border-color:var(--tier-low-bd);color:var(--tier-low-fg);}
.card-level.tier-mid{background:var(--tier-mid-bg);border-color:var(--tier-mid-bd);color:var(--tier-mid-fg);}
.card-level.tier-high{background:var(--tier-high-bg);border-color:var(--tier-high-bd);color:var(--tier-high-fg);}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:1.04rem;
  font-weight:700;
  letter-spacing:.5px;
  color:#fff;
  margin-bottom:10px;
  line-height:1.3;
}

.card-desc{
  font-size:.84rem;
  color:rgba(255,255,255,.78);
  line-height:1.5;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  text-overflow:ellipsis;
  transition:-webkit-line-clamp .2s;
}
.topic-card:hover .card-desc{-webkit-line-clamp:8;}

.card-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px 8px;
  margin-top:auto;
  padding-top:14px;
}
.card-tag{
  font-size:.68rem;
  font-weight:600;
  border-radius:10px;
  padding:3px 9px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.95);
}

/* Footer + CTA pill */
.card-footer{
  position:relative;
  z-index:1;
  display:flex;
  justify-content:flex-end;
  padding:0 22px 18px;
}
.card-cta{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.25);
  border-radius:20px;
  padding:6px 12px 6px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.02em;
  color:#fff;
  transition:background .15s, border-color .15s, transform .15s;
}
.card-cta .arrow{font-size:.95rem;line-height:1;transform:translateY(-1px);}
.topic-card:hover .card-cta{
  background:rgba(255,255,255,.26);
  border-color:rgba(255,255,255,.55);
  transform:translateX(2px);
}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:2rem;margin-bottom:10px;}
.empty-state p{font-weight:500;font-size:.9rem;}

/* HIDDEN */
.hidden{display:none!important;}

/* BACK BUTTON */
.back-btn{position:fixed;top:18px;left:18px;z-index:100;display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px 7px 11px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--text2);text-decoration:none;box-shadow:var(--shadow-sm);transition:all .15s;}
.back-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);transform:translateX(-2px);}
.back-btn .arrow{font-size:1rem;line-height:1;}
@media (max-width:600px){.back-btn{top:12px;left:12px;padding:6px 12px 6px 9px;font-size:.74rem;}}

/* PLACEHOLDER CARDS — fondo blanco, texto negro */
.topic-card.placeholder {
  background: #ffffff !important;
  border: 2px dashed #bbb !important;
  box-shadow: 0 2px 10px rgba(0,0,0,.08) !important;
}
.topic-card.placeholder .card-num { color: #999 !important; }
.topic-card.placeholder .card-title { color: #1a1814 !important; }
.topic-card.placeholder .card-desc { color: #555 !important; }
.topic-card.placeholder .card-tag {
  background: #f0ede8 !important;
  border: 1px solid #ccc !important;
  color: #333 !important;
}
.topic-card.placeholder .card-cta {
  background: #f0ede8 !important;
  border: 1px solid #bbb !important;
  color: #333 !important;
}
.topic-card.placeholder::before { background: none !important; }
.topic-card.placeholder:hover { border-color: #888 !important; }
</style>
</head>
<body>

<a class="back-btn" href="index.html" title="Volver al índice de portugués">
  <span class="arrow">←</span><span>Índice</span>
</a>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">
      <h1>🇧🇷 Gramática portuguesa (PB)</h1>
      <span class="header-tag">CEFR A1–C1</span>
    </div>
    <p class="header-sub">Índice de bloques · <strong>55 temas</strong> · Referencia + ejercicios con IA · 🔴 = exclusivo del portugués</p>
    <div class="stats-row">
      <div class="stat-badge"><span class="dot" style="background:var(--teal)"></span>Verbos y tiempos</div>
      <div class="stat-badge"><span class="dot" style="background:var(--green)"></span>Sintaxis</div>
      <div class="stat-badge"><span class="dot" style="background:var(--wine)"></span>Discurso</div>
      <div class="stat-badge"><span class="dot" style="background:var(--orange)"></span>Léxico gramatical</div>
      <div class="stat-badge"><span class="dot" style="background:var(--purple)"></span>Producción</div>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Buscar tema… (ej: subjuntivo, pretérito, infinitivo pessoal…)" oninput="filterCards(this.value)" id="search-input">
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">Todos</button>
    <button class="ftab" onclick="setFilter('verbos',this)">Verbos y tiempos</button>
    <button class="ftab" onclick="setFilter('sintaxis',this)">Sintaxis</button>
    <button class="ftab" onclick="setFilter('discurso',this)">Discurso</button>
    <button class="ftab" onclick="setFilter('lexico',this)">Léxico gramatical</button>
    <button class="ftab" onclick="setFilter('produccion',this)">Producción</button>
  </div>
</div>

<main class="main" id="main">
  <div class="grid" id="grid"></div>
  <div class="empty-state hidden" id="empty">
    <div class="empty-icon">🔎</div>
    <p>Ningún tema coincide con tu búsqueda.</p>
  </div>
</main>

<script>
const TOPICS = [
  // ===== VERBOS · INDICATIVO =====
  {
    num:"01", file:"gramatica_presente.html",
    title:"Presente do Indicativo",
    desc:"Conjugaciones regulares -ar/-er/-ir e irregulares clave (ser, estar, ter, ir, vir, pôr, fazer, dizer, dar, ver, saber, poder, querer). Alternancias vocálicas en -ir (durmo, sinto, sirvo). Usos: habitual, atemporal, futuro próximo, histórico.",
    tags:["presente","conjugação","irregulares","ser","estar","ter","alternâncias"],
    cat:"verbos", level:"A1–B1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"02", file:"gramatica_preterito_perfeito_imperfeito.html",
    title:"Pretérito Perfeito Simples e Imperfeito",
    desc:"Formación regular e irregulares (fui, fiz, disse, vi, pus, trouxe, soube, quis, pude). Contraste PPS/Imperfeito. Imperfecto cortés (queria pedir). Imperfecto narrativo y descriptivo. Verbos con cambio de significado (sabia/soube, conhecia/conheci).",
    tags:["pretérito perfeito","imperfeito","fui","fiz","irregulares","contraste"],
    cat:"verbos", level:"A2–B1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"03", file:"gramatica_mais_que_perfeito.html",
    title:"Pretérito Mais-que-Perfeito",
    desc:"Forma simple literaria (falara, fizera, dissera) y forma compuesta corriente (tinha falado, havia feito). Anterioridad en el pasado. Valor de condicional irreal en formal (quem me dera, tomara). El simple solo en registro escrito culto.",
    tags:["mais-que-perfeito","tinha falado","falara","anterioridade","literário"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"04", file:"gramatica_preterito_perfeito_composto.html",
    title:"🔴 Pretérito Perfeito Composto",
    desc:"EXCLUSIVO DEL PORTUGUÉS: tenho feito = acción repetida/continua hasta el presente. NO equivale al 'he hecho' español. Solo valor iterativo o durativo (tenho trabalhado muito = he estado trabajando últimamente). Una de las mayores trampas para hispanohablantes.",
    tags:["pretérito composto","tenho feito","iterativo","durativo","armadilha","exclusivo"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"05", file:"gramatica_futuro_presente_preterito.html",
    title:"Futuro do Presente e Futuro do Pretérito",
    desc:"Futuro do presente: regular e irregulares (farei, direi, trarei). Valor temporal y epistémico (será que…?). Futuro do pretérito (= condicional): cortesía, deseo, hipótesis, futuro en el pasado. Sustitución coloquial PB por ir + infinitivo (vou fazer / ia fazer).",
    tags:["futuro","condicional","faria","poderia","cortesia","ir + infinitivo"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  // ===== VERBOS · IMPERATIVO =====
  {
    num:"06", file:"gramatica_imperativo.html",
    title:"Imperativo — Formal e Coloquial",
    desc:"Imperativo formal (subjuntivo: faça, venha, não faça). Imperativo coloquial PB (indicativo: faz, vai, não faz, não vai — muy frecuente en habla). Pronombres con imperativo: ênclise normativa (faça-o, dê-me) vs próclise real PB (me dá, te liga, se senta).",
    tags:["imperativo","faça","faz","negativo","formal","coloquial","ênclise"],
    cat:"verbos", level:"A2–B1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  // ===== VERBOS · SUBJUNTIVO E CONDICIONAL =====
  {
    num:"07", file:"gramatica_subjuntivo_presente_passado.html",
    title:"Subjuntivo Presente e Passado",
    desc:"Formación e irregulares (seja, esteja, tenha, vá, venha, faça, diga, saiba, possa, queira). Imperfeito do subjuntivo (fosse, tivesse, fizesse, pudesse). Contextos: opinión, duda, emoción, volición, impersonales, indefinidos, concesivas (embora, talvez).",
    tags:["subjuntivo","seja","tenha","fosse","embora","talvez","opinião"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"08", file:"gramatica_subjuntivo_futuro.html",
    title:"🔴 Subjuntivo Futuro",
    desc:"EXCLUSIVO DEL PORTUGUÉS — no existe en español ni italiano. Formación a partir del PPS 3ª pl (fizeram → fizer, tiveram → tiver, foram → for). Uso obligatorio en temporales (quando chegar), condicionales (se vier) y relativas (quem fizer) referidas al futuro.",
    tags:["subjuntivo futuro","quando chegar","se vier","quem fizer","exclusivo"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"09", file:"gramatica_periodo_hipotetico.html",
    title:"Período Hipotético Completo",
    desc:"Tipo I real (se + presente/futuro subj. → indicativo/futuro). Tipo II hipotético (se eu pudesse, faria). Tipo III irreal pasado (se tivesse podido, teria feito). Mixto. Caso, contanto que, desde que, a menos que, a não ser que (+ subj.).",
    tags:["se","período hipotético","caso","contanto que","irreal","tipo II","tipo III"],
    cat:"verbos", level:"B2–C1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  // ===== VERBOS · FORMAS NOMINAIS E PERÍFRASES =====
  {
    num:"10", file:"gramatica_infinitivo_pessoal.html",
    title:"🔴 Infinitivo Pessoal (Flexionado)",
    desc:"EXCLUSIVO DEL PORTUGUÉS: infinitivo con desinencias personales (falarmos, fazerem, sermos). Obligatorio con sujeto distinto del principal (é importante vocês estudarem). Optativo para clarificar. Distinción crítica con infinitivo impessoal. Marcador C1.",
    tags:["infinitivo pessoal","flexionado","estudarmos","fazerem","exclusivo"],
    cat:"verbos", level:"B2–C1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"11", file:"gramatica_gerundio.html",
    title:"🔴 Gerúndio — PB vs PE",
    desc:"PB: estar/ir/andar/ficar/vir + gerúndio como progresivo (estou falando). PE: estar a + infinitivo (estou a falar). Gerúndio temporal, modal, causal. Construção absoluta. Gerundismo (vou estar fazendo) como vicio coloquial criticado.",
    tags:["gerúndio","estou falando","gerundismo","PB vs PE","progressivo"],
    cat:"verbos", level:"A2–B1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"12", file:"gramatica_participio.html",
    title:"Particípio e Duplos Particípios",
    desc:"Regulares (-ado/-ido) e irregulares (feito, dito, visto, posto, aberto, escrito, vindo). Duplos particípios: aceitado/aceito, pegado/pego, matado/morto, ganhado/ganho, gastado/gasto — forma regular con ter/haver, forma corta con ser/estar. Concordancia.",
    tags:["particípio","duplos","aceito","pego","morto","concordância","irregulares"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"13", file:"gramatica_voz_passiva.html",
    title:"Voz Passiva — Sistema Completo",
    desc:"Pasiva con ser + particípio (acción). Pasiva con estar + particípio (resultado/estado). Se apassivador (vendem-se casas). Se impessoal (precisa-se de). Diferencia PB vs PE en uso del se. Pasiva coloquial con ter (já tenho feito isso).",
    tags:["passiva","ser","estar","se apassivador","se impessoal","agente","por"],
    cat:"verbos", level:"B2–C1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"14", file:"gramatica_verbos_modais.html",
    title:"Verbos Modais — Uso Avançado",
    desc:"Poder, dever, precisar (de), ter que/ter de, conseguir, saber. Valor epistémico vs deóntico. Dever + infinitivo (obligación) vs dever + ter + particípio (probabilidad pasada: deve ter chegado). Conseguir vs poder (capacidad vs posibilidad).",
    tags:["modais","poder","dever","ter que","conseguir","precisar","epistêmico"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"15", file:"gramatica_perifrases_verbais.html",
    title:"Perífrases Verbais",
    desc:"Estar + gerúndio (progresivo), ir + infinitivo (futuro/intención), acabar de + inf. (recién), continuar + ger./a + inf., começar a, parar de, deixar de, voltar a, ficar + ger. (repetición/continuidad — muy PB), andar + ger., vir + ger.",
    tags:["perífrases","estar fazendo","ir + inf","acabar de","ficar fazendo","andar"],
    cat:"verbos", level:"B1–C1",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {
    num:"16", file:"gramatica_verbos_pronominais.html",
    title:"Verbos Pronominais e Reflexivos",
    desc:"Colocación PB: pronombre antes del verbo en habla (me chamo, te amo, se foi). Verbos con cambio de significado: ir/ir-se, lembrar/lembrar-se (recordar/acordarse), esquecer/esquecer-se, encontrar/encontrar-se. Recíprocos (um ao outro).",
    tags:["pronominais","reflexivos","me chamo","ir-se","lembrar-se","recíprocos"],
    cat:"verbos", level:"B1–B2",
    color:"#ffffff", colorbg:"#ffffff", placeholder:true
  },
  {

// Map level range to tier accent (by upper bound)
function getLevelTier(level){
  if(level.includes("C1")) return "tier-high";
  if(level.includes("B2")) return "tier-mid";
  return "tier-low";
}

let activeFilter = "all";

function buildCards(items){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if(!items.length){
    grid.innerHTML="";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  const cats = ["verbos","sintaxis","discurso","lexico","produccion"];
  let html = "";
  cats.forEach(cat => {
    const filtered = items.filter(t => t.cat === cat);
    if(!filtered.length) return;
    if(activeFilter === "all"){
      html += `<div class="section-label" style="grid-column:1/-1">${CAT_LABELS[cat]}</div>`;
    }
    filtered.forEach(t => {
      const tier = getLevelTier(t.level);
      const placeholderClass = t.placeholder ? " placeholder" : "";
      html += `
        <a class="topic-card${placeholderClass}" href="${t.file}" target="_blank" data-cat="${t.cat}" data-search="${t.title.toLowerCase()} ${t.desc.toLowerCase()} ${t.tags.join(" ").toLowerCase()}" style="background:${t.colorbg};">
          <div class="card-body">
            <div class="card-top">
              <span class="card-num">${t.num}</span>
              <span class="card-level ${tier}">${t.level}</span>
            </div>
            <div class="card-title">${t.title}</div>
            <div class="card-desc">${t.desc}</div>
            <div class="card-tags">
              ${t.tags.map(tag => `<span class="card-tag">${tag}</span>`).join("")}
            </div>
          </div>
          <div class="card-footer">
            <span class="card-cta">Ver más <span class="arrow">→</span></span>
          </div>
        </a>`;
    });
  });
  grid.innerHTML = html;
}

function applyFilters(){
  let items = TOPICS;
  if(activeFilter !== "all") items = items.filter(t => t.cat === activeFilter);
  if(searchVal.trim()){
    const q = searchVal.trim().toLowerCase();
    items = items.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q))
    );
  }
  buildCards(items);
}

function setFilter(cat, btn){
  activeFilter = cat;
  document.querySelectorAll(".ftab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function filterCards(val){
  searchVal = val;
  applyFilters();
}

applyFilters();
</script>
</body>
</html>
