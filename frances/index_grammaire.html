<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammaire française · DELF B1–B2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ede9df; --card:#faf7f1; --border:#c4bead;
  --text:#1a1814; --text2:#44413a; --text3:#706c64;
  --accent:#7a5a0a; --accent-light:#f0e0c0; --accent-mid:#b89050;
  --shadow:0 2px 14px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --shadow-sm:0 1px 6px rgba(0,0,0,.07);
  --radius:14px; --radius-sm:8px;
  --green:#1a6028; --green-bg:#e4f2e8;
  --blue:#163494; --blue-bg:#e6ebf8;
  --purple:#6a1a8a; --purple-bg:#f2e6f8;
  --wine:#8b1a4a; --wine-bg:#f8e6ee;
  --teal:#0e6060; --teal-bg:#e0f2f2;
  --orange:#8b4a0a; --orange-bg:#f8ede0;
  /* dark card colors */
  --dk-blue:#1a2f6e; --dk-green:#06402b; --dk-purple:#4a1460;
  --dk-wine:#6e1438; --dk-teal:#0a4242; --dk-orange:#8b5e00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.site-header{background:var(--card);border-bottom:2px solid var(--border);padding:28px 20px 22px;}
.header-inner{max-width:900px;margin:0 auto;}
.header-top{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;flex-wrap:wrap;}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2.2rem);font-weight:700;color:var(--text);}
.header-tag{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:20px;padding:3px 11px;}
.header-sub{font-size:.78rem;color:var(--text3);font-weight:500;margin-bottom:18px;}
.header-sub strong{color:var(--accent);}

/* STATS ROW */
.stats-row{display:flex;flex-wrap:wrap;gap:8px;}
.stat-badge{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px;}
.stat-badge .dot{width:7px;height:7px;border-radius:50%;}

/* SEARCH */
.search-wrap{max-width:900px;margin:0 auto;padding:18px 20px 0;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 16px;box-shadow:var(--shadow-sm);}
.search-icon{color:var(--text3);font-size:1rem;flex-shrink:0;}
.search-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;}
.search-input::placeholder{color:var(--text3);}

/* FILTER TABS */
.filter-wrap{max-width:900px;margin:0 auto;padding:14px 20px 0;}
.filter-tabs{display:flex;gap:7px;flex-wrap:wrap;}
.ftab{border:1.5px solid var(--border);border-radius:20px;padding:6px 15px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;white-space:nowrap;}
.ftab:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* GRID */
.main{max-width:900px;margin:0 auto;padding:18px 20px 48px;}
.section-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:24px 0 12px;padding-left:2px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;align-items:stretch;}

/* CARD */
.topic-card{
  position:relative;
  border:1.5px solid rgba(255,255,255,.06);
  border-radius:var(--radius);
  box-shadow:0 3px 16px rgba(0,0,0,.22),0 1px 4px rgba(0,0,0,.12);
  cursor:pointer;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  text-decoration:none;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  min-height:230px;
}
.topic-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.07) 0%, rgba(255,255,255,0) 42%, rgba(0,0,0,.18) 100%);
  pointer-events:none;
  border-radius:inherit;
  z-index:0;
}
.topic-card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.24);
  box-shadow:0 8px 30px rgba(0,0,0,.34),0 2px 8px rgba(0,0,0,.16);
}
.card-accent{display:none;}
.card-body{
  position:relative;
  z-index:1;
  padding:22px 22px 60px;
  flex:1;
  display:flex;
  flex-direction:column;
}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.card-num{font-size:.7rem;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.55);}

/* Level badges by MCER tier */
.card-level{
  font-size:.65rem;
  font-weight:700;
  border-radius:10px;
  padding:3px 9px;
  letter-spacing:.04em;
}
.card-level.lvl-low{
  background:rgba(80,200,140,.18);
  border:1px solid rgba(80,200,140,.5);
  color:#a8eecb;
}
.card-level.lvl-mid{
  background:rgba(110,150,255,.18);
  border:1px solid rgba(110,150,255,.5);
  color:#bdccff;
}
.card-level.lvl-high{
  background:rgba(170,130,255,.2);
  border:1px solid rgba(170,130,255,.55);
  color:#dcc6ff;
}

.card-title{
  font-family:'Playfair Display',serif;
  font-size:1.02rem;
  font-weight:700;
  letter-spacing:.012em;
  color:#fff;
  margin-bottom:8px;
  line-height:1.3;
}
.card-desc{
  font-size:.85rem;
  color:rgba(255,255,255,.8);
  line-height:1.5;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  margin-bottom:14px;
  transition:all .2s ease;
}
.topic-card:hover .card-desc{
  -webkit-line-clamp:unset;
  overflow:visible;
}
.card-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px 8px;
  margin-top:auto;
  padding-top:4px;
}
.card-tag{
  font-size:.68rem;
  font-weight:600;
  border-radius:10px;
  padding:3px 8px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.94);
}

/* CTA pill */
.card-cta{
  position:absolute;
  right:16px;
  bottom:16px;
  z-index:2;
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-family:'DM Sans',sans-serif;
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.03em;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);
  color:#fff;
  border-radius:18px;
  padding:5px 11px 5px 12px;
  transition:background .15s,border-color .15s,transform .15s;
}
.card-cta .arrow{font-size:.95rem;line-height:1;}
.topic-card:hover .card-cta{
  background:rgba(255,255,255,.24);
  border-color:rgba(255,255,255,.45);
  transform:translateX(2px);
}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:2rem;margin-bottom:10px;}
.empty-state p{font-weight:500;font-size:.9rem;}

/* HIDDEN */
.hidden{display:none!important;}

/* BACK BUTTON */
.back-btn{position:fixed;top:18px;left:18px;z-index:100;display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:7px 14px 7px 11px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;color:var(--text2);text-decoration:none;box-shadow:var(--shadow-sm);transition:all .15s;}
.back-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);transform:translateX(-2px);}
.back-btn .arrow{font-size:1rem;line-height:1;}
@media (max-width:600px){.back-btn{top:12px;left:12px;padding:6px 12px 6px 9px;font-size:.74rem;}}

/* PLACEHOLDER CARDS — fondo blanco, texto negro */
.topic-card.placeholder {
  background: #ffffff !important;
  border: 2px dashed #bbb !important;
  box-shadow: 0 2px 10px rgba(0,0,0,.08) !important;
}
.topic-card.placeholder .card-num { color: #999 !important; }
.topic-card.placeholder .card-title { color: #1a1814 !important; }
.topic-card.placeholder .card-desc { color: #555 !important; }
.topic-card.placeholder .card-tag {
  background: #f0ede8 !important;
  border: 1px solid #ccc !important;
  color: #333 !important;
}
.topic-card.placeholder .card-cta {
  background: #f0ede8 !important;
  border: 1px solid #bbb !important;
  color: #333 !important;
}
.topic-card.placeholder::before {
  background: none !important;
}
.topic-card.placeholder:hover {
  border-color: #888 !important;
}
</style>
</head>
<body>

<a class="back-btn" href="index.html" title="Volver al índice de francés">
  <span class="arrow">←</span><span>Índice</span>
</a>

<header class="site-header">
  <div class="header-inner">
    <div class="header-top">

      <span class="header-tag">DELF B1–B2</span>
    </div>
    <p class="header-sub">Índice de bloques · <strong>29 temas</strong> · Referencia + ejercicios con IA</p>
    <div class="stats-row">
      <div class="stat-badge"><span class="dot" style="background:var(--teal)"></span>Verbos y tiempos</div>
      <div class="stat-badge"><span class="dot" style="background:var(--green)"></span>Sintaxis</div>
      <div class="stat-badge"><span class="dot" style="background:var(--purple)"></span>Discurso</div>
      <div class="stat-badge"><span class="dot" style="background:var(--wine)"></span>Léxico gramatical</div>
      <div class="stat-badge"><span class="dot" style="background:var(--purple)"></span>Producción</div>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Buscar tema… (ej: subjonctif, passé, adverbes…)" oninput="filterCards(this.value)" id="search-input">
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">Todos</button>
    <button class="ftab" onclick="setFilter('verbos',this)">Verbos y tiempos</button>
    <button class="ftab" onclick="setFilter('sintaxis',this)">Sintaxis</button>
    <button class="ftab" onclick="setFilter('discurso',this)">Discurso</button>
    <button class="ftab" onclick="setFilter('lexico',this)">Léxico gramatical</button>
    <button class="ftab" onclick="setFilter('produccion',this)">Producción</button>
  </div>
</div>

<main class="main" id="main">
  <div class="grid" id="grid"></div>
  <div class="empty-state hidden" id="empty">
    <div class="empty-icon">🔎</div>
    <p>Ningún tema coincide con tu búsqueda.</p>
  </div>
</main>

    desc:"[En construcción] À, de, en, dans, par, pour, avec. Países y ciudades. Medios de transporte. Trampas para hispanohablantes.",
    tags:["prépositions","à","de","en","dans","pays","transport"],
    cat:"lexico", level:"A2–B1",
    color:"#ffffff", colorbg:"#ffffff",
    placeholder: true
  },
  {
    num:"29", file:"grammaire_pronominaux.html",
    title:"Les Verbes Pronominaux",
    desc:"[En construcción] Reflexivos, recíprocos, pasivos pronominales. Accord du participe passé. Verbos de sentido cambiado (s'en aller, se rendre compte…).",
    tags:["pronominaux","réfléchis","réciproques","accord","se","sens idiomatique"],
    cat:"sintaxis", level:"B1",
    color:"#ffffff", colorbg:"#ffffff",
    placeholder: true
  },
];

const CAT_LABELS = {
  verbos:"Verbos y tiempos",
  sintaxis:"Sintaxis",
  discurso:"Discurso",
  lexico:"Léxico gramatical",
  produccion:"Producción"
};

let activeFilter = "all";
let searchVal = "";

function levelClass(level){
  if(/C1|C2|B2\s*[-–]\s*C/.test(level)) return 'lvl-high';
  if(/B1\s*[-–]\s*B2|^B2/.test(level)) return 'lvl-mid';
  return 'lvl-low';
}

function buildCards(items){
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  if(!items.length){
    grid.innerHTML="";
    empty.classList.remove("hidden");
    return;
  }
  empty.classList.add("hidden");

  // Group by category
  const cats = ["verbos","sintaxis","discurso","lexico","produccion"];
  let html = "";
  cats.forEach(cat => {
    const filtered = items.filter(t => t.cat === cat);
    if(!filtered.length) return;
    if(activeFilter === "all"){
      html += `<div class="section-label" style="grid-column:1/-1">${CAT_LABELS[cat]}</div>`;
    }
    filtered.forEach(t => {
      const placeholderClass = t.placeholder ? " placeholder" : "";
      html += `
        <a class="topic-card${placeholderClass}" href="${t.file}" target="_blank" data-cat="${t.cat}" data-search="${t.title.toLowerCase()} ${t.desc.toLowerCase()} ${t.tags.join(" ").toLowerCase()}" style="background:${t.colorbg};">
          <div class="card-body">
            <div class="card-top">
              <span class="card-num">${t.num}</span>
              <span class="card-level ${levelClass(t.level)}">${t.level}</span>
            </div>
            <div class="card-title">${t.title}</div>
            <div class="card-desc">${t.desc}</div>
            <div class="card-tags">
              ${t.tags.map(tag => `<span class="card-tag">${tag}</span>`).join("")}
            </div>
          </div>
          <span class="card-cta">Ver más <span class="arrow">→</span></span>
        </a>`;
    });
  });
  grid.innerHTML = html;
}

function applyFilters(){
  let items = TOPICS;
  if(activeFilter !== "all") items = items.filter(t => t.cat === activeFilter);
  if(searchVal.trim()){
    const q = searchVal.trim().toLowerCase();
    items = items.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q))
    );
  }
  buildCards(items);
}

function setFilter(cat, btn){
  activeFilter = cat;
  document.querySelectorAll(".ftab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function filterCards(val){
  searchVal = val;
  applyFilters();
}

// Init
applyFilters();
</script>
</body>
</html>
