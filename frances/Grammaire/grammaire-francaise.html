<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammaire Française</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #222118;
    --border: #2e2c26;
    --border-light: #3a3830;
    --gold: #c9a84c;
    --gold-dim: #8a6f30;
    --gold-glow: rgba(201,168,76,0.12);
    --text: #e8e4d8;
    --text-dim: #9a9488;
    --text-muted: #5a5750;
    --accent: #5b8fa8;
    --accent-dim: #3a6078;
    --red: #c0614a;
    --green: #5a9e6f;
    --tag-bg: #252318;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
  }
  .header-flag { font-size: 22px; }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    letter-spacing: 0.03em;
  }
  .header-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-left: auto;
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  .sidebar-section {
    padding: 6px 16px 2px;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    font-size: 13px;
    color: var(--text-dim);
  }
  .nav-item:hover { background: var(--gold-glow); color: var(--text); }
  .nav-item.active {
    border-left-color: var(--gold);
    background: var(--gold-glow);
    color: var(--gold);
    font-weight: 500;
  }
  .nav-item .nav-icon { font-size: 14px; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    font-size: 9px;
    background: var(--border);
    color: var(--text-muted);
    padding: 1px 6px;
    border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── MAIN CONTENT ── */
  main {
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  .content-area {
    overflow-y: auto;
    padding: 28px 32px;
  }
  .content-area::-webkit-scrollbar { width: 4px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

  /* ── TOPIC HEADER ── */
  .topic-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .topic-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight
