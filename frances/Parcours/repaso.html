<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repaso SRS · Parcours B1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafafa; --surface:#ffffff; --border:#e5e5e5; --border-strong:#d4d4d4;
  --text:#0a0a0a; --text2:#525252; --text3:#737373;
  --accent:#2563eb; --accent-soft:#dbeafe; --accent-deep:#1d4ed8;
  --c-vocab:#d97706; --c-vocab-bg:#fef3c7; --c-vocab-border:#fcd34d;
  --green:#15803d; --green-bg:#dcfce7;
  --red:#b91c1c; --red-bg:#fee2e2;
  --amber:#b45309; --amber-bg:#fef3c7;
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 2px 8px rgba(0,0,0,.05),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --header-bg-rgb:255,255,255;
}
[data-theme="dark"]{
  --bg:#0a0a0b; --surface:#18181b; --border:#27272a; --border-strong:#3f3f46;
  --text:#fafafa; --text2:#d4d4d8; --text3:#8e8e96;
  --accent:#60a5fa; --accent-soft:rgba(96,165,250,.15); --accent-deep:#3b82f6;
  --c-vocab:#fbbf24; --c-vocab-bg:rgba(251,191,36,.12); --c-vocab-border:rgba(251,191,36,.30);
  --green:#4ade80; --green-bg:rgba(74,222,128,.12);
  --red:#f87171; --red-bg:rgba(248,113,113,.12);
  --amber:#fbbf24; --amber-bg:rgba(251,191,36,.12);
  --shadow-xs:0 1px 2px rgba(0,0,0,.30);
  --shadow-sm:0 2px 8px rgba(0,0,0,.40),0 1px 2px rgba(0,0,0,.30);
  --shadow:0 4px 16px rgba(0,0,0,.40),0 1px 3px rgba(0,0,0,.30);
  --header-bg-rgb:18,18,27;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55;}

.site-header{background:rgba(var(--header-bg-rgb),.88);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--border);padding:18px 20px 16px;position:sticky;top:0;z-index:50;}
.header-inner{max-width:680px;margin:0 auto;position:relative;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:5px 12px 5px 9px;font-size:.78rem;font-weight:600;color:var(--text2);text-decoration:none;transition:all .15s;box-shadow:var(--shadow-xs);}
.back-btn:hover{background:var(--bg);border-color:var(--border-strong);color:var(--text);}
.back-btn .arrow{font-size:1rem;line-height:1;}
h1{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;}
.header-tag{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--c-vocab);background:var(--c-vocab-bg);border-radius:100px;padding:3px 10px;border:1px solid var(--c-vocab-border);}
.theme-toggle{position:absolute;top:0;right:0;display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:.95rem;}
.theme-toggle:hover{background:var(--bg);color:var(--text);}
.theme-toggle::before{content:"◐";line-height:1;}
[data-theme="dark"] .theme-toggle::before{content:"☼";}

.main{max-width:680px;margin:0 auto;padding:24px 20px 60px;}

/* STATS BAR */
.stats-bar{display:flex;gap:8px;margin-bottom:20px;font-size:.76rem;color:var(--text2);font-weight:600;flex-wrap:wrap;}
.chip{padding:5px 11px;background:var(--surface);border:1px solid var(--border);border-radius:100px;display:inline-flex;align-items:center;gap:6px;}
.chip strong{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;}
.chip.new strong{color:var(--c-vocab);}
.chip.learning strong{color:var(--amber);}
.chip.known strong{color:var(--green);}

/* CONTROLES */
.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.controls label{font-size:.76rem;color:var(--text3);font-weight:600;}
.controls select{font-family:inherit;font-size:.82rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);cursor:pointer;}
.controls .btn-mini{font-family:inherit;font-size:.76rem;font-weight:600;border-radius:7px;padding:6px 11px;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;}
.controls .btn-mini:hover{background:var(--bg);color:var(--text);border-color:var(--border-strong);}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:48px 28px;text-align:center;margin-bottom:18px;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;user-select:none;transition:transform .15s;}
.card:hover{transform:translateY(-2px);}
.card .front-text,.card .back-text{font-size:1.6rem;font-weight:700;letter-spacing:-.015em;line-height:1.3;}
.card .back-text{color:var(--c-vocab);}
.card .hint{font-size:.86rem;color:var(--text3);font-weight:500;margin-top:8px;font-style:italic;}
.card .lid{position:absolute;top:14px;left:16px;font-size:.7rem;font-weight:700;color:var(--c-vocab);background:var(--c-vocab-bg);padding:3px 10px;border-radius:100px;border:1px solid var(--c-vocab-border);letter-spacing:.04em;}
.card-wrap{position:relative;}
.tap-hint{font-size:.74rem;color:var(--text3);margin-top:14px;font-weight:500;}
.tap-hint kbd{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-family:inherit;font-size:.72rem;color:var(--text2);font-weight:600;}

/* GRADE BUTTONS */
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.grade{font-family:inherit;font-size:.84rem;font-weight:700;color:#fff;border:none;border-radius:11px;padding:13px 10px 11px;cursor:pointer;transition:filter .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.grade:hover{filter:brightness(.93);}
.grade .lbl{font-weight:700;}
.grade .delay{font-size:.7rem;font-weight:500;opacity:.85;font-variant-numeric:tabular-nums;}
.grade[data-q="1"]{background:var(--red);}
.grade[data-q="2"]{background:var(--amber);}
.grade[data-q="4"]{background:var(--accent);}
.grade[data-q="5"]{background:var(--green);}
.grade kbd{display:inline-block;background:rgba(255,255,255,.22);border-radius:4px;padding:0 5px;font-size:.7rem;font-family:inherit;margin-top:3px;}

.grades-hidden{opacity:.35;pointer-events:none;}

.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:48px 24px;text-align:center;}
.empty-state h2{font-size:1.15rem;font-weight:700;margin-bottom:8px;}
.empty-state p{font-size:.9rem;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.empty-state .btn-primary{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-family:inherit;font-size:.86rem;font-weight:700;cursor:pointer;text-decoration:none;}

@media (max-width:480px){
  .card{padding:40px 18px;min-height:240px;}
  .card .front-text,.card .back-text{font-size:1.35rem;}
  .grade{font-size:.78rem;padding:12px 6px 10px;}
  .grade .delay{font-size:.66rem;}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <button type="button" class="theme-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema"></button>
    <a class="back-btn" href="index.html"><span class="arrow">‹</span><span>Parcours B1</span></a>
    <h1>Repaso SRS</h1>
    <span class="header-tag">SM-2 · vocabulario</span>
  </div>
</header>

<main class="main">

  <div class="stats-bar">
    <span class="chip"><strong id="cDue">0</strong> · pendientes hoy</span>
    <span class="chip new"><strong id="cNew">0</strong> · nuevas</span>
    <span class="chip learning"><strong id="cLearn">0</strong> · aprendiendo</span>
    <span class="chip known"><strong id="cKnown">0</strong> · dominadas</span>
    <span class="chip"><strong id="cTotal">0</strong> · totales</span>
  </div>

  <div class="controls">
    <label>Leçon:
      <select id="filterLecon">
        <option value="">Todas</option>
      </select>
    </label>
    <label>Nuevas/día:
      <select id="newPerDay">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="999">Todas</option>
      </select>
    </label>
    <button class="btn-mini" id="resetSrs" title="Borrar el progreso de SRS">↺ Reiniciar SRS</button>
  </div>

  <div id="sessionArea"></div>

</main>

<div class="cloud-status" id="cloudStatus" role="status" aria-live="polite" style="position:fixed;bottom:14px;right:14px;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:.74rem;font-weight:600;color:var(--text2);box-shadow:var(--shadow-sm);opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .25s, transform .25s;z-index:8000;">
  <span class="cs-dot" style="width:8px;height:8px;border-radius:50%;background:var(--text3);"></span>
  <span class="cs-text">Listo</span>
</div>

<script>
const SRS_KEY = 'parcours_b1_srs';
const SETTINGS_KEY = 'parcours_b1_srs_settings';
const LS_THEME = 'parcours_theme';

let DATA = [];          // flashcards
let SRS  = {};          // {cardId: {ef, interval, reps, due, lastReview}}
let SETTINGS = { newPerDay: 10, filterLecon: '' };
let session = [];       // array de cardIds para esta sesión
let currentIdx = 0;
let flipped = false;

// Theme
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t==='dark'?'dark':''); }
try { applyTheme(localStorage.getItem(LS_THEME) || 'light'); } catch(e){}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  const cur = document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';
  const next = cur==='dark'?'light':'dark';
  applyTheme(next);
  try{ localStorage.setItem(LS_THEME, next); }catch(e){}
});

// Load SRS state + settings
function loadSrs(){ try{ SRS = JSON.parse(localStorage.getItem(SRS_KEY)||'{}'); }catch(e){ SRS={}; } }
function saveSrs(){ try{ localStorage.setItem(SRS_KEY, JSON.stringify(SRS)); }catch(e){} if(window.parcoursCloud) window.parcoursCloud.notify(); }
function loadSettings(){
  try{ Object.assign(SETTINGS, JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')); }catch(e){}
  document.getElementById('newPerDay').value = SETTINGS.newPerDay;
  document.getElementById('filterLecon').value = SETTINGS.filterLecon;
}
function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(SETTINGS)); }catch(e){}
}

// SM-2 algorithm (simplificado)
function gradeCard(cardId, q){
  // q: 1=Otra vez · 2=Difícil · 4=Normal · 5=Fácil
  const s = SRS[cardId] || { ef:2.5, interval:0, reps:0, due:0, lastReview:0 };
  let { ef, interval, reps } = s;
  if (q < 3){
    // Reset learning
    reps = 0;
    interval = q===1 ? 0 : 1;  // 0 = inmediato (en este turno)
    ef = Math.max(1.3, ef - 0.2);
  } else {
    reps += 1;
    if (reps === 1) interval = 1;
    else if (reps === 2) interval = 6;
    else interval = Math.round(interval * ef);
    if (q === 5){
      interval = Math.round(interval * 1.3);
      ef += 0.15;
    }
    if (q === 4) ef += 0.05;
    ef = Math.max(1.3, Math.min(2.8, ef));
  }
  const now = Date.now();
  const due = now + interval * 24 * 60 * 60 * 1000;
  SRS[cardId] = { ef, interval, reps, due, lastReview: now };
  saveSrs();
  return interval;
}

function delayLabel(interval){
  if (interval === 0) return '<10 min';
  if (interval === 1) return '1 día';
  if (interval < 30) return interval + ' días';
  if (interval < 365) return Math.round(interval/30) + ' meses';
  return Math.round(interval/365) + ' años';
}

function buildSession(){
  const now = Date.now();
  const filter = SETTINGS.filterLecon;
  const pool = DATA.map((c,i) => ({...c, _id: String(i)}))
                   .filter(c => !filter || String(c.lecon) === filter);
  const due = [], newer = [];
  for (const c of pool){
    const s = SRS[c._id];
    if (s && s.due) {
      if (s.due <= now) due.push(c);
    } else {
      newer.push(c);
    }
  }
  // Mezclar nuevas (límite del día)
  const today = new Date().toISOString().slice(0,10);
  const seenToday = Object.values(SRS).filter(s => s.lastReview && new Date(s.lastReview).toISOString().slice(0,10)===today && s.reps===1).length;
  const newLimit = Math.max(0, +SETTINGS.newPerDay - seenToday);
  const newSlice = newer.sort(() => Math.random()-.5).slice(0, newLimit);
  // Resultado
  return [...due, ...newSlice].map(c => c._id);
}

function refreshStats(){
  const now = Date.now();
  let due=0, newC=0, learning=0, known=0;
  const filter = SETTINGS.filterLecon;
  DATA.forEach((c, i) => {
    if (filter && String(c.lecon) !== filter) return;
    const s = SRS[String(i)];
    if (!s) { newC++; }
    else if (s.due <= now) { due++; if (s.reps>=2) known++; else learning++; }
    else if (s.reps >= 2) { known++; }
    else { learning++; }
  });
  document.getElementById('cDue').textContent = due;
  document.getElementById('cNew').textContent = newC;
  document.getElementById('cLearn').textContent = learning;
  document.getElementById('cKnown').textContent = known;
  document.getElementById('cTotal').textContent = DATA.filter(c => !filter || String(c.lecon) === filter).length;
}

function renderCard(){
  const area = document.getElementById('sessionArea');
  if (currentIdx >= session.length){
    // Sesión completada
    area.innerHTML = `
      <div class="empty-state">
        <h2>🎉 ¡Sesión completada!</h2>
        <p>Has revisado <strong>${session.length}</strong> tarjetas. Vuelve mañana para las siguientes.</p>
        <a class="btn-primary" href="index.html">Volver al camino</a>
      </div>`;
    return;
  }
  const id = session[currentIdx];
  const card = DATA[+id];
  const previewIntervals = [
    gradePreview(id, 1),
    gradePreview(id, 2),
    gradePreview(id, 4),
    gradePreview(id, 5)
  ];
  area.innerHTML = `
    <div class="card-wrap">
      <div class="card" id="cardEl">
        <span class="lid">L${card.lecon}</span>
        <div class="front-text">${card.es}</div>
        ${card.hint ? '<div class="hint">' + card.hint + '</div>' : ''}
        <div class="tap-hint">Toca para revelar · <kbd>Space</kbd></div>
      </div>
    </div>
    <div class="grades grades-hidden" id="grades">
      <button class="grade" data-q="1"><span class="lbl">Otra vez</span><span class="delay">${delayLabel(previewIntervals[0])}</span><kbd>1</kbd></button>
      <button class="grade" data-q="2"><span class="lbl">Difícil</span><span class="delay">${delayLabel(previewIntervals[1])}</span><kbd>2</kbd></button>
      <button class="grade" data-q="4"><span class="lbl">Normal</span><span class="delay">${delayLabel(previewIntervals[2])}</span><kbd>3</kbd></button>
      <button class="grade" data-q="5"><span class="lbl">Fácil</span><span class="delay">${delayLabel(previewIntervals[3])}</span><kbd>4</kbd></button>
    </div>
  `;
  document.getElementById('cardEl').addEventListener('click', flipCard);
  document.querySelectorAll('.grade').forEach(b => b.addEventListener('click', () => grade(+b.dataset.q)));
  flipped = false;
}

// Calcula intervalo preview sin guardar
function gradePreview(cardId, q){
  const s = SRS[cardId] || { ef:2.5, interval:0, reps:0 };
  let { ef, interval, reps } = s;
  if (q < 3){
    reps = 0;
    interval = q===1 ? 0 : 1;
    ef = Math.max(1.3, ef - 0.2);
  } else {
    reps += 1;
    if (reps === 1) interval = 1;
    else if (reps === 2) interval = 6;
    else interval = Math.round(interval * ef);
    if (q === 5) interval = Math.round(interval * 1.3);
  }
  return interval;
}

function flipCard(){
  if (flipped) return;
  flipped = true;
  const id = session[currentIdx];
  const card = DATA[+id];
  const el = document.getElementById('cardEl');
  el.innerHTML = `
    <span class="lid">L${card.lecon}</span>
    <div class="front-text" style="opacity:.5;font-size:1.05rem;">${card.es}${card.hint?' <em style="font-size:.86rem;color:var(--text3);font-weight:500;">('+card.hint+')</em>':''}</div>
    <div class="back-text" style="margin-top:14px;">${card.fr}</div>
  `;
  document.getElementById('grades').classList.remove('grades-hidden');
}

function grade(q){
  if (!flipped) return;
  gradeCard(session[currentIdx], q);
  currentIdx++;
  refreshStats();
  renderCard();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if(!flipped) flipCard(); }
  else if (flipped && ['1','2','3','4'].includes(e.key)) {
    const map = {'1':1,'2':2,'3':4,'4':5};
    grade(map[e.key]);
  }
});

// Settings handlers
document.getElementById('newPerDay').addEventListener('change', e => {
  SETTINGS.newPerDay = +e.target.value; saveSettings();
  session = buildSession(); currentIdx = 0; refreshStats(); renderCard();
});
document.getElementById('filterLecon').addEventListener('change', e => {
  SETTINGS.filterLecon = e.target.value; saveSettings();
  session = buildSession(); currentIdx = 0; refreshStats(); renderCard();
});
document.getElementById('resetSrs').addEventListener('click', () => {
  if (confirm('¿Borrar todo el progreso de SRS? Esto no afecta tus scores de ejercicios.')) {
    SRS = {}; saveSrs();
    session = buildSession(); currentIdx = 0; refreshStats(); renderCard();
  }
});

// Init
fetch('vocab.json').then(r => r.json()).then(data => {
  DATA = data;
  loadSettings();
  loadSrs();

  // Populate filterLecon options
  const sel = document.getElementById('filterLecon');
  const lecons = [...new Set(data.map(c => c.lecon))].sort((a,b)=>a-b);
  lecons.forEach(n => {
    const opt = document.createElement('option');
    opt.value = String(n);
    opt.textContent = 'Leçon ' + n;
    sel.appendChild(opt);
  });
  sel.value = SETTINGS.filterLecon;

  session = buildSession();
  currentIdx = 0;
  refreshStats();
  renderCard();
});

window.addEventListener('parcours:cloud-loaded', () => {
  loadSrs();
  session = buildSession();
  currentIdx = 0;
  refreshStats();
  renderCard();
});
</script>

<script src="parcours.js"></script>
</body>
</html>
